---
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: secretstore
spec:
  provider:
    kubernetes:
      remoteNamespace: secretstore
      server:
        caProvider:
          type: ConfigMap
          name: kube-root-ca.crt
          namespace: secretstore
          key: ca.crt
      auth:
        serviceAccount:
          name: external-secrets-reader
          namespace: secretstore
---
apiVersion: generators.external-secrets.io/v1alpha1
kind: ClusterGenerator
metadata:
  name: uuid
spec:
  kind: UUID
  generator:
    uuidSpec: {}
---
apiVersion: generators.external-secrets.io/v1alpha1
kind: ClusterGenerator
metadata:
  name: password
spec:
  kind: Password
  generator:
    passwordSpec:
      length: 24
      allowRepeat: true
      symbolCharacters: "~!@#%^&*_+-=:<>?,./"
      noUpper: false