---
kind: Namespace
apiVersion: v1
metadata:
  name: sandbox
---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgresql
  namespace: sandbox
spec:
  instances: 2
  imageName: ghcr.io/cloudnative-pg/postgresql:17.5
  bootstrap:
    # initdb is default, other options include recovery/backup
    initdb:
      database: app1
      owner: app1
      # run sql queries
      # https://cloudnative-pg.io/docs/1.29/bootstrap#executing-queries-after-initialization
      # postInitApplicationSQL - 
  storage:
    size: 5Gi
  resources:
    requests:
      memory: 10Mi
      cpu: 10m
  managed:
    services:
      additional:
        - selectorType: rw
          serviceTemplate:
            metadata:
              name: postgresql-kftray
              annotations:
                kftray.app/enabled: "true"
                kftray.app/configs: "postgresql-5432-5432"
            spec:
              type: ClusterIP